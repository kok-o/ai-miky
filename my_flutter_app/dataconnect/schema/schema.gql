type User @table {
  username: String!
  email: String!
  createdAt: Timestamp!
  firstName: String
  lastName: String
  preferredLanguage: String
  timezone: String
}

type Interaction @table {
  query: String!
  response: String!
  interactionType: String!
  createdAt: Timestamp!
  feedback: String
  user: User
}

type Reminder @table {
  message: String!
  reminderTime: Timestamp!
  isActive: Boolean!
  createdAt: Timestamp!
  recurrence: String
  user: User
}

type ToDoList @table {
  name: String!
  createdAt: Timestamp!
  description: String
  user: User
}

type Task @table {
  description: String!
  isCompleted: Boolean!
  createdAt: Timestamp!
  dueDate: Date
  priority: Int
  toDoList: ToDoList
}